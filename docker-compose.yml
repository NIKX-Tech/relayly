version: "3.9"

services:
  relayly:
    build:
      context: .
      args:
        VERSION: "${VERSION:-dev}"
    image: relayly:${VERSION:-dev}
    container_name: relayly
    restart: unless-stopped

    ports:
      - "8080:8080"   # WebSocket relay
      - "8081:8081"   # Admin UI

    volumes:
      - ./data:/data  # SQLite DB + Noise keypairs

    environment:
      RELAYLY_HOST: "0.0.0.0"
      RELAYLY_PORT: "8080"
      RELAYLY_DB_PATH: "/data/relayly.db"
      RELAYLY_NOISE_KEY_PATH: "/data/server.noise.key"
      RELAYLY_ADMIN_ENABLED: "true"
      RELAYLY_ADMIN_PORT: "8081"
      RELAYLY_LOG_LEVEL: "info"

    healthcheck:
      test: ["CMD", "/relayly", "status", "--format=json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    labels:
      com.relayly.description: "WebSocket relay server"
