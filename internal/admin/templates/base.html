<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900 text-gray-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{block "title" .}}Relayly Admin{{end}}</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <!-- Tailwind CDN (admin-only, not on the relay path) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            relay: {
              400: '#818cf8',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca'
            }
          }
        }
      }
    }
  </script>
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    .status-dot { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .brand-bar { background: linear-gradient(90deg, #4338ca, #6366f1, #818cf8); }
  </style>
</head>
<body class="h-full flex flex-col font-sans antialiased bg-gray-900">

  <!-- Brand accent bar -->
  <div class="brand-bar h-0.5 w-full flex-shrink-0"></div>

  <!-- Navbar -->
  <nav class="bg-gray-950 border-b border-gray-800 px-6 py-3.5 flex items-center gap-4 flex-shrink-0">
    <a href="/" class="flex items-center gap-2.5 group">
      <img src="/static/logo.png" alt="Relayly" class="w-8 h-8 object-contain" />
      <div class="flex items-baseline gap-2">
        <span class="text-base font-bold tracking-tight text-white">Relayly</span>
        <span class="text-xs text-gray-500 font-mono bg-gray-800 px-1.5 py-0.5 rounded leading-none">admin</span>
      </div>
    </a>
    <div class="ml-auto flex items-center gap-1 text-sm">
      <a href="/" class="px-3 py-1.5 rounded-md text-gray-400 hover:text-white hover:bg-gray-800 transition-colors">Dashboard</a>
      <a href="/devices" class="px-3 py-1.5 rounded-md text-gray-400 hover:text-white hover:bg-gray-800 transition-colors">Devices</a>
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex-1 overflow-auto bg-gray-900">
    {{block "content" .}}{{end}}
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-800 px-6 py-4 flex-shrink-0">
    <div class="max-w-5xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3">

      <!-- Left: copyright + encryption note -->
      <div class="flex items-center gap-2 text-xs text-gray-600">
        <svg class="w-3.5 h-3.5 text-green-700 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span>E2E encrypted · Noise Protocol XX</span>
        <span class="text-gray-700">·</span>
        <span>© {{.Year}} NIKX Technologies</span>
      </div>

      <!-- Center: links -->
      <div class="flex items-center gap-4 text-xs text-gray-600">
        <a href="https://relayly.app" target="_blank" rel="noopener" class="hover:text-gray-400 transition-colors">Website</a>
        <a href="https://github.com/NIKX-Tech/relayly" target="_blank" rel="noopener" class="hover:text-gray-400 transition-colors">GitHub</a>
        <a href="https://pkg.go.dev/github.com/NIKX-Tech/relayly" target="_blank" rel="noopener" class="hover:text-gray-400 transition-colors">Go Docs</a>
        <a href="https://discord.gg/cTFMfk6V7" target="_blank" rel="noopener" class="hover:text-gray-400 transition-colors">Discord</a>
        <a href="https://opensource.org/licenses/MIT" target="_blank" rel="noopener" class="hover:text-gray-400 transition-colors">MIT License</a>
      </div>

      <!-- Right: version -->
      <span class="text-xs text-gray-700 font-mono">{{.Version}}</span>

    </div>
  </footer>

</body>
</html>
