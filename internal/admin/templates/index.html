{{template "base.html" .}}

{{define "title"}}Dashboard · Relayly{{end}}

{{define "content"}}
<div class="max-w-5xl mx-auto px-6 py-10">

  <!-- Hero stats -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-10">

    <div class="bg-gray-900 rounded-xl border border-gray-800 p-5 flex flex-col gap-1">
      <span class="text-xs uppercase tracking-widest text-gray-500 font-semibold">Connected</span>
      <div class="flex items-center gap-2 mt-1">
        <span class="status-dot inline-block w-2.5 h-2.5 rounded-full {{if gt .Connected 0}}bg-green-400{{else}}bg-gray-600{{end}}"></span>
        <span class="text-3xl font-bold text-white">{{.Connected}}</span>
        <span class="text-gray-400 text-sm">device{{if ne .Connected 1}}s{{end}}</span>
      </div>
    </div>

    <div class="bg-gray-900 rounded-xl border border-gray-800 p-5 flex flex-col gap-1">
      <span class="text-xs uppercase tracking-widest text-gray-500 font-semibold">Uptime</span>
      <span class="text-3xl font-bold text-white mt-1">{{.Uptime}}</span>
    </div>

    <div class="bg-gray-900 rounded-xl border border-gray-800 p-5 flex flex-col gap-1">
      <span class="text-xs uppercase tracking-widest text-gray-500 font-semibold">Total Devices</span>
      <span class="text-3xl font-bold text-white mt-1">{{len .Devices}}</span>
    </div>

  </div>

  <!-- Devices table (auto-refreshes every 5s via HTMX) -->
  <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
    <div class="px-5 py-4 border-b border-gray-800 flex items-center justify-between">
      <h2 class="font-semibold text-white">Registered Devices</h2>
      <a href="/devices" class="text-xs text-relay-500 hover:underline">Manage →</a>
    </div>

    <div
      hx-get="/htmx/devices"
      hx-trigger="every 5s"
      hx-swap="innerHTML">
      {{template "devices_table_body" .}}
    </div>
  </div>

</div>
{{end}}
