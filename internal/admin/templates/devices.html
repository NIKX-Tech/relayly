{{template "base.html" .}}

{{define "title"}}Devices · Relayly{{end}}

{{define "content"}}
<div class="max-w-5xl mx-auto px-6 py-10">

  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-white">Devices</h1>
    <span class="text-sm text-gray-500">{{len .Devices}} registered</span>
  </div>

  <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
    <div
      id="devices-table"
      hx-get="/htmx/devices"
      hx-trigger="every 5s"
      hx-swap="innerHTML">
      {{template "devices_table_body" .}}
    </div>
  </div>

</div>
{{end}}
